name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install flake8 explicitly so we can lint
        pip install flake8
        # Install project dependencies if requirements.txt exists
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure core libraries are installed for verification (in case requirements.txt is missing)
        pip install scikit-learn pandas joblib textstat xgboost
        
    - name: Basic Environment Verification
      run: |
        python -c "import sklearn; import pandas; import joblib; import xgboost; print('Core ML dependencies loaded OK')"
        
    - name: Lint source code with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all other issues as warnings, so we don't break the build over style
        flake8 src/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics
